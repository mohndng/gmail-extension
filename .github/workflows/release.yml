name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Triggers on push of tags starting with 'v' (e.g. v1.0, v2.0)
  workflow_dispatch: # Allows manual trigger directly from GitHub Actions tab

permissions:
  contents: write # Required to publish releases

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build:
    name: Assemble & Publish App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Repair and Download Clean Gradle Wrapper JAR
        run: |
          echo "Repairing corrupt/incomplete gradle-wrapper.jar..."
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar

      - name: Create .env from template
        run: cp .env.example .env

      - name: Set up Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f "debug.keystore" ]; then
            echo "debug.keystore already exists."
          else
            echo "Generating new debug.keystore dynamically using keytool..."
            keytool -genkey -v -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US"
          fi

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Find and Export APK Path
        id: find_apk
        run: |
          apk_file=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$apk_file" ]; then
            echo "Error: APK file not generated or found!"
            exit 1
          fi
          echo "APK_PATH=$apk_file" >> $GITHUB_ENV

      - name: Upload APK as Run Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GmailGenerator-debug-apk
          path: ${{ env.APK_PATH }}
          retention-days: 14

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.APK_PATH }}
          name: Release ${{ github.ref_name }}
          body: |
            ### 📦 Gmail Generator Application Release (${{ github.ref_name }})
            
            This is an automated compilation of your Android application built securely via GitHub Actions CI.
            
            #### 📥 Download & Install:
            - **Download the APK asset listed below** directly to your Android device.
            - Enable **"Allow Installation from Unknown Sources"** if requested by your browser/device settings.
            - Open the file and follow the prompts to install!
            
            #### ✨ Key Application Capabilities:
            * **Aesthetic Theme Presets**: Amethyst, Cosmic Ocean, Forest Mint, and Sunset Ruby customizable on-the-fly.
            * **Immersive Welcome Splash**: Fluid animations welcoming you on start.
            * **Live Mandatory Update Logic**: Fully functional over-the-air update configurations connected dynamically over the internet with GitHub.
          draft: false
          prerelease: false
